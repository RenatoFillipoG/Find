<!doctype html>
<html lang="PT-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find | Home</title>

    <link rel="stylesheet" href="../assets/fonts/style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./styles/home.css" />
    <link rel="stylesheet" href="./styles/toast.css">
  </head>
  <body>
    <header class="cabecalho">
      <div class="userName">
        <h1 id="user-Name">Olá!</h1>
      </div>
      <div class="buttons">
        <a href="./createSearch.html" class="button">Criar busca</a>
        <div class="user-menu">
          <i class="icon-user" id="user-icon"></i>
          <div id="user-modal" class="user-modal">
            <button onclick="window.location.href = './mySearches.html'">
              Meus Anúncios
            </button>
            <hr />
            <button id="logout-btn" class="logout-red">Sair</button>
          </div>
        </div>
      </div>
    </header>
    <main>
      <section>
        <div class="content">
          <div class="busca">
            <i class="icon-search"></i>
            <input
              type="text"
              id="search"
              placeholder="Comece encotrando pets na sua região..."
            />
          </div>
          <h2 class="title">Pets perdidos na sua região:</h2>

          <div class="cards" id="cardsContainer"><p>Carregando pets...</p></div>
        </div>
      </section>
    </main>
    <div id="info-modal" class="modal">
      <div class="modal-content">
        <span class="close-button" onclick="closeInfoModal()"></span>
        <div id="info-content"></div>
      </div>
    </div>
    <script type="module" src="./script/home.js"></script>
  </body>
</html>
